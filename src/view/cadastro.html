<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - AEDS3 Trader</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>AEDS3 Trader</h1>
        <nav class="nav-links">
            <a href="index.html">Início</a>
            <a href="login.html">Login</a>
        </nav>
    </header>
    <main class="container">
        <div class="card" style="max-width: 400px; margin: auto;">
            <h2>Criar Conta</h2>
            <div id="mensagem"></div>
            <form id="cadastroForm">
                <div class="form-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" required>
                </div>
                <button type="submit" style="width: 100%;">Cadastrar</button>
            </form>
            <p style="text-align: center; margin-top: 1rem; color: var(--text-light);">
                Já tem uma conta? <a href="login.html" style="color: var(--primary);">Entre aqui</a>
            </p>
        </div>
    </main>

    <script>
        document.getElementById('cadastroForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const msgDiv = document.getElementById('mensagem');

            try {
                const response = await fetch('/api/cadastro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, email, senha })
                });

                const data = await response.json();

                if (response.ok) {
                    msgDiv.innerHTML = `<div class="alert alert-success">${data.mensagem}</div>`;
                    setTimeout(() => location.href = 'login.html', 1500);
                } else {
                    msgDiv.innerHTML = `<div class="alert alert-error">${data.erro}</div>`;
                }
            } catch (error) {
                msgDiv.innerHTML = `<div class="alert alert-error">Erro ao conectar ao servidor</div>`;
            }
        });
    </script>
</body>
</html>
