<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Usuários</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
        header { background-color: #333; color: #fff; padding: 1rem; text-align: center; }
        nav ul { list-style: none; padding: 0; }
        nav ul li { display: inline; margin-right: 15px; }
        nav ul li a { color: #fff; text-decoration: none; }
        main { padding: 20px; max-width: 800px; margin: 20px auto; background: #fff; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #333; padding-bottom: 10px; }
        form { display: grid; gap: 10px; margin-bottom: 30px; }
        input { padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px; background-color: #28a745; color: white; border: none; cursor: pointer; border-radius: 4px; font-size: 16px; }
        button:hover { background-color: #218838; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; }
        .btn-edit { background-color: #ffc107; color: black; padding: 5px 10px; text-decoration: none; border-radius: 3px; font-size: 14px; }
        .btn-delete { background-color: #dc3545; color: white; padding: 5px 10px; border: none; border-radius: 3px; cursor: pointer; font-size: 14px; }
        footer { text-align: center; padding: 1rem; background: #eee; margin-top: 20px; }
    </style>
</head>
<body>
    <header>
        <h1>Gerenciamento de Usuários</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="usuarios.html">Usuários</a></li>
                <li><a href="ativos.html">Ativos</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <h2>Novo Usuário</h2>
            <form>
                <input type="text" placeholder="Nome completo" required>
                <input type="email" placeholder="E-mail" required>
                <input type="password" placeholder="Senha" required>
                <button type="submit">Cadastrar Usuário</button>
            </form>
        </section>

        <section>
            <h2>Lista de Usuários</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>E-mail</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>Exemplo de Usuário</td>
                        <td>usuario@email.com</td>
                        <td>
                            <a href="#" class="btn-edit">Editar</a>
                            <button class="btn-delete">Excluir</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 - AEDS III</p>
    </footer>
</body>
</html>
